[package]
edition = "2021"
name = "rayclaw"
version = "0.1.7"
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Multi-channel agentic AI runtime with tool-calling, memory, and scheduling"
readme = "README.md"
keywords = [
    "ai",
    "agent",
    "llm",
    "chatbot",
    "runtime",
]
categories = [
    "api-bindings",
    "asynchronous",
]
license = "MIT"
repository = "https://github.com/rayclaw/rayclaw"

[features]
all = [
    "telegram",
    "discord",
    "slack",
    "feishu",
    "web",
]
default = [
    "telegram",
    "discord",
    "slack",
    "feishu",
]
discord = ["dep:serenity"]
feishu = []
openssl-vendored = ["dep:openssl"]
slack = []
sqlite-vec = ["dep:sqlite-vec"]
telegram = ["dep:teloxide"]
web = ["dep:axum"]

[lib]
name = "rayclaw"
path = "src/lib.rs"

[[bin]]
name = "rayclaw"
path = "src/main.rs"

[[test]]
name = "acp_integration"
path = "tests/acp_integration.rs"

[[test]]
name = "config_validation"
path = "tests/config_validation.rs"

[[test]]
name = "db_integration"
path = "tests/db_integration.rs"

[[test]]
name = "tool_permissions"
path = "tests/tool_permissions.rs"

